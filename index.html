<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Verse AR</title>

  <link rel="stylesheet" href="style.css">

  <script
    type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
  </script>
</head>
<body>

  <div class="hero">

    <!-- TOP SECTION -->
    <div class="top">

      <div class="title-section">
        <span class="brand">KFC</span>

        <h1 id="name"></h1>

        <p id="tagline"></p>
      </div>

      <div class="price-box">
        <h2 id="price"></h2>
        <span id="rating"></span>
      </div>

    </div>

    <!-- 3D PREVIEW -->
    <div class="viewer-section">

      <model-viewer
        id="burgerViewer"
        camera-controls
        auto-rotate
        rotation-per-second="25deg"
        shadow-intensity="1"
        exposure="1.1"
        ar
        ar-modes="scene-viewer webxr quick-look"
        interaction-prompt="none"
        loading="eager">

      </model-viewer>

    </div>

    <!-- TAGS -->
    <div class="tags">
      <span id="calories"></span>
      <span id="spice"></span>
    </div>

    <!-- BUTTONS -->
    <div class="controls">

      <button id="arBtn">
        ✨ View in AR
      </button>

      <button id="pauseBtn">
        Pause
      </button>

      <button id="resetBtn">
        Reset view
      </button>

    </div>

  </div>

  <!-- DETAILS SECTION -->

  <section class="bottom">

    <!-- LEFT CARD -->

    <div class="left-card">

      <h2>About this dish</h2>

      <p id="description"></p>

      <div class="columns">

        <div>

          <h3>INGREDIENTS</h3>

          <ul id="ingredients">
          </ul>

        </div>

        <div>

          <h3>ALLERGENS</h3>

          <ul id="allergens">
          </ul>

        </div>

      </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-side">

      <div class="card">

        <h3>NUTRITION</h3>

        <div class="row">
          <span>Calories</span>
          <strong id="nutritionCalories"></strong>
        </div>

        <div class="row">
          <span>Rating</span>
          <strong id="nutritionRating"></strong>
        </div>

        <div class="row">
          <span>Spice</span>
          <strong id="nutritionSpice"></strong>
        </div>

      </div>

      <div class="card">

        <h3>ADD-ONS</h3>

        <div id="addons">

        </div>

      </div>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
