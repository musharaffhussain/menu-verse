<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js">
</script>

<section class="hero">

  <div class="top">
    <div>
      <span>KFC</span>
      <h1>Zinger Burger</h1>
      <p>Crispy. Fiery. Iconic.</p>
    </div>

    <div class="price-box">
      <h2>₹249</h2>
      <span>⭐ 4.6</span>
    </div>
  </div>

  <!-- Burger Preview -->
  <div class="burger-preview">

    <model-viewer
      id="burgerViewer"
      src="./models/zinger_burger.glb"
      camera-controls
      auto-rotate
      rotation-per-second="30deg"
      shadow-intensity="1"
      exposure="1.1"
      ar
      ar-modes="scene-viewer webxr quick-look"
      interaction-prompt="none">

    </model-viewer>

  </div>

  <div class="tags">
    <span>🔥 650 kcal</span>
    <span>🌶 Medium Spicy</span>
  </div>

  <div class="controls">
    <button id="arBtn">✨ View in AR</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset View</button>
  </div>

</section>
